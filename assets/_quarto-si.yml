project:
  type: default

title: "Supporting Information"

# Note: Document metadata (authors, abstract, keywords) belongs in
# index.qmd frontmatter, NOT in _quarto.yml. The SI project's _quarto.yml
# only needs crossref and format settings. See SKILL.md §"Metadata placement".

crossref:
  fig-title: "Figure S"
  tbl-title: "Table S"
  eq-title: "Equation S"

format:
  docx:
    reference-doc: template.docx
    csl: <journal>.csl                     # Same CSL as main manuscript
    filters:
      - scripts/abstract.lua         # Shared with main — harmless when abstract is absent

bibliography: references.bib
